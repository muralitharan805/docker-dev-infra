# Redis configuration for local development

# Network
bind * -::*
protected-mode yes
port 6379

# Memory Management to prevent OOM
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence - AOF (Append Only File)
appendonly yes
appendfsync everysec

# Persistence - RDB (Snapshots)
save 3600 1
save 300 100
save 60 10000
